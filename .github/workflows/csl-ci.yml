name: csl CI

on: [push, pull_request]

defaults:
  run:
    shell: bash -euo pipefail -c "{0}"

jobs:
  build_and_test:

    # ubuntu-latest TODO: ${{ matrix.OS }}
    runs-on: ubuntu-24.04

    strategy:
      # fail-fast: false
      # TODO: sanitizers
        matrix:
            CMAKE_BUILD_TYPE: [ Debug, Release ]
            CSL_component: [ ag, ensure, functional, mp, typeinfo, wf ]
            compiler:
              - CMAKE_C_COMPILER: clang
                CMAKE_CXX_COMPILER: clang++
                version: 18
              - CMAKE_C_COMPILER: clang
                CMAKE_CXX_COMPILER: clang++
                version: 19
              - CMAKE_C_COMPILER: gcc
                CMAKE_CXX_COMPILER: g++
                version: 13
              - CMAKE_C_COMPILER: gcc
                CMAKE_CXX_COMPILER: g++
                version: 14
            STL:
              - name: gnu-libstdcxx
                CMAKE_CXX_FLAGS: '-stdlib=libstdc++'
              - name: llvm-libcxx
                CMAKE_CXX_FLAGS: '-stdlib=libc++'
                CMAKE_EXE_LINKER_FLAGS: '-stdlib=libc++ -lc++abi'
            exclude:
            - compiler:
                CMAKE_C_COMPILER: gcc
              STL:
                name: llvm-libcxx

    # WIP: github composite action for build_and_test
    env:
      TOOLCHAIN_PATH: '${{ matrix.CMAKE_BUILD_TYPE }}/${{ matrix.COMPILER.CMAKE_C_COMPILER }}-${{ matrix.compiler.version }}/${{ matrix.STL.name }}/${{ matrix.CSL_component }}'

    steps:
    - uses: actions/checkout@v4

    # TECH-DEBT: only once for all matrix product - one cache per OS, compiler, STL
    # - subaction to build + test a specific cache entry, using a toolchain as argument
    # TODO: cross-build ?
    
    - name: Install compiler, STL (${{matrix.COMPILER.CMAKE_C_COMPILER}}-${{ matrix.compiler.version }}, ${{ matrix.STL.name }})
      run: |
          
          sudo apt update -qqy

          COMPILER_INSTALL_SCRIPTS_DIRNAME=".devcontainer/scripts/"

          if [[ "${{ matrix.compiler.CMAKE_C_COMPILER }}" == "clang" ]]; then
              
              script_name='./${COMPILER_INSTALL_SCRIPTS_DIRNAME}/llvm.sh'
              sudo chmod +x "${script_name}" && sudo ./"${script_name}" --silent=yes --alias=no --minimalistic --cleanup --versions="${{ matrix.compiler.version }}"

              if [[ "${{ matrix.STL.name }}" == "gnu-libstdcxx" ]]; then
                script_name='./${COMPILER_INSTALL_SCRIPTS_DIRNAME}/gcc.sh'
                sudo chmod +x "${script_name}" && sudo ./"${script_name}" --silent=yes --alias=no --minimalistic --cleanup --versions="latest-stable"
              fi
          fi

          if [[ "${{ matrix.compiler.CMAKE_C_COMPILER }}" == "gcc" ]]; then

              script_name='./${COMPILER_INSTALL_SCRIPTS_DIRNAME}/gcc.sh'
              sudo chmod +x "${script_name}" && sudo ./"${script_name}" --silent=yes --alias=no --minimalistic --cleanup --versions="${{ matrix.compiler.version }}"
          fi

    - name: CMake create destination directories (${{ env.TOOLCHAIN_PATH }})
      run: |
        cmake -E make_directory ${{ github.workspace }}/out/build/${{ env.TOOLCHAIN_PATH }}
        cmake -E make_directory ${{ github.workspace }}/out/install/${{ env.TOOLCHAIN_PATH }}
      
    - name: 📦 CMake cache (${{ env.TOOLCHAIN_PATH }})
      run: |
        cmake \
              -DCSL_BUILD_ALL:BOOL=OFF            \
              -DCSL_BENCHMARK_ALL:BOOL=OFF        \
              -DCSL_DOC_ALL:BOOL=OFF              \
              -DCSL_EXAMPLE_ALL:BOOL=OFF          \
              -DCSL_TEST_ALL:BOOL=OFF             \
            \
              -DCSL_BUILD_${{ matrix.CSL_component }}:BOOL=TRUE      \
              -DCSL_BENCHMARK_${{ matrix.CSL_component }}:BOOL=TRUE  \
              -DCSL_EXAMPLE_${{ matrix.CSL_component }}:BOOL=TRUE    \
              -DCSL_EXAMPLE_${{ matrix.CSL_component }}:BOOL=TRUE    \
              -DCSL_TEST_${{ matrix.CSL_component }}:BOOL=TRUE       \
            \
              -DCMAKE_C_COMPILER=/usr/bin/${{matrix.COMPILER.CMAKE_C_COMPILER}}-${{ matrix.compiler.version }}      \
              -DCMAKE_CXX_COMPILER=/usr/bin/${{matrix.COMPILER.CMAKE_CXX_COMPILER}}-${{ matrix.compiler.version }}  \
              -DCMAKE_CXX_FLAGS="${{matrix.STL.CMAKE_CXX_FLAGS}}"                                                   \
              -DCMAKE_EXE_LINKER_FLAGS="${{matrix.STL.CMAKE_EXE_LINKER_FLAGS}}"                                     \
              -DCMAKE_BUILD_TYPE:STRING=${{ matrix.CMAKE_BUILD_TYPE }}                                              \
              -DCMAKE_INSTALL_PREFIX:PATH=${{ github.workspace }}/out/install/${{ env.TOOLCHAIN_PATH }}             \
              -DCMAKE_GENERATOR:STRING=Ninja                                                                        \
              -G Ninja                                                                                              \
              -S ${{ github.workspace }}                                                                            \
              -B ${{ github.workspace }}/out/build/${{ env.TOOLCHAIN_PATH }}

    # WIP: build the target, its tests, then use ctest filter to run only the targets tests (or all, as there are the only one which should be builded)
    #   rename tests: test_csl_${{ matrix.CSL_component }}_*

    - name: 🏗️ CMake build - (${{ env.TOOLCHAIN_PATH }})
      run: |
        cmake \
            --build ${{ github.workspace }}/out/build/${{ env.TOOLCHAIN_PATH }} \
            --config ${{ matrix.CMAKE_BUILD_TYPE }} \
            --target all
      # --target ${{ matrix.CSL_component }}_build_all_tests

    - name: 🧪 CTest - (${{ env.TOOLCHAIN_PATH }})
      working-directory: ${{ github.workspace }}/out/build/${{ env.TOOLCHAIN_PATH }}
      shell: bash
      run: |
        ctest --parallel 10 \
        --output-on-failure \
        --test-dir ${{ github.workspace }}/out/build/${{ env.TOOLCHAIN_PATH }}
      # --no-tests=error
      # -R csl_test_${{ matrix.CSL_component }}
      # --tests-regex '^csl_test_${{ matrix.CSL_component }}*$'

      # TECH-DEBT: check examples (run as tests)
      # TECH-DEBT: check installation

