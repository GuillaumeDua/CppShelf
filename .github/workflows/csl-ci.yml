name: csl CI

on: [push, pull_request]

defaults:
  run:
    shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}

jobs:
  build_and_test:

    name: ${{ format('{0}{1} ({2} {3}-{4} {5})', matrix.enable_sanitizer == 'true' && '(sanitizer) ' || '', matrix.CSL_component, matrix.configuration.OS, matrix.configuration.CMAKE_C_COMPILER, matrix.configuration.version, matrix.CMAKE_BUILD_TYPE) }}

    # name: |
    #   ${{ matrix.enable_sanitizer == 'true' && '(sanitizer) ' || '' }}
    #   ${{ matrix.CSL_component }} 
    #   (${{ matrix.configuration.OS }} ${{ matrix.configuration.CMAKE_C_COMPILER }}-${{ matrix.configuration.version }} ${{ matrix.CMAKE_BUILD_TYPE }})
    
    runs-on: ${{ matrix.configuration.OS }}
    timeout-minutes: 15
    # continue-on-error: true

    strategy:
        fail-fast: false
        matrix:
            CMAKE_BUILD_TYPE: [ Debug, Release ]
            CSL_component: [ ag, ensure, functional, mp, typeinfo, wf ]
            configuration:
            # TODO: ARM once it's not public preview (ubuntu-24.04-arm)
            # clang-19
            - {
              OS: ubuntu-latest,
              CMAKE_C_COMPILER: clang,
              CMAKE_CXX_COMPILER: clang++,
              version: 19,
              libcxx: true
            }
            - {
              OS: ubuntu-latest,
              CMAKE_C_COMPILER: clang,
              CMAKE_CXX_COMPILER: clang++,
              version: 19
            }
            # clang-18
            - {
              OS: ubuntu-latest,
              CMAKE_C_COMPILER: clang,
              CMAKE_CXX_COMPILER: clang++,
              version: 18,
              libcxx: true
            }
            - {
              OS: ubuntu-latest,
              CMAKE_C_COMPILER: clang,
              CMAKE_CXX_COMPILER: clang++,
              version: 18
            }
            # gcc-14
            - {
              OS: ubuntu-latest,
              CMAKE_C_COMPILER: gcc,
              CMAKE_CXX_COMPILER: g++,
              version: 14
            }
            # gcc-13
            - {
              OS: ubuntu-latest,
              CMAKE_C_COMPILER: gcc,
              CMAKE_CXX_COMPILER: g++,
              version: 13
            }
            # msvc-cl
            # - {
            #   OS: windows-latest,
            #   CMAKE_C_COMPILER: cl,
            #   CMAKE_CXX_COMPILER: cl,
            #   version: 13
            # }
            # Apple clang
            # - {
            #   OS: macos-latest,
            #   CMAKE_C_COMPILER: clang,
            #   CMAKE_CXX_COMPILER: clang++,
            #   version: 19
            # }
            include:
              - CMAKE_BUILD_TYPE: Debug
                configuration:
                  OS: ubuntu-latest
                  CMAKE_C_COMPILER: clang
                  CMAKE_CXX_COMPILER: clang++
                  version: 'latest-stable'
                  libcxx: true
                  CMAKE_CXX_FLAGS: '-fsanitize=address,undefined -fno-omit-frame-pointer -g'
                  CMAKE_EXE_LINKER_FLAGS: '-fsanitize=address,undefined'
                enable_sanitizer: true
                # continue-on-error: true
            # sanitizer:
            #   # for Debug
            #   - "-fsanitize=address,undefined,leak -fno-omit-frame-pointer"
            #   - "-fsanitize=memory"
            #   - "-fsanitize=thread"
            #   - "-fsanitize=dataflow"
            #   # for Release
            #   - "-flto -fvisibility=hidden -fsanitize=cfi -fno-sanitize-trap=cfi"

        
    # env:
    #   CMAKE_CXX_FLAGS: '-stdlib=libc++'
    #   CMAKE_EXE_LINKER_FLAGS: '-stdlib=libc++ -lc++abi'


    steps:
    - uses: actions/checkout@v4
   
    # TECH-DEBT: only once for all matrix product - one cache per OS, compiler, STL
    # - subaction to build + test a specific cache entry, using a toolchain as argument
    # TODO: cross-build ?
    
    - name: Set libc++ env flags
      if: matrix.configuration.libcxx && matrix.configuration.CMAKE_C_COMPILER == 'clang'
      run: |
        echo "CMAKE_CXX_FLAGS=-stdlib=libc++" >> "$GITHUB_ENV"
        echo "CMAKE_EXE_LINKER_FLAGS=-stdlib=libc++ -lc++abi" >> "$GITHUB_ENV"


    - name: Install clang
      if: ${{ startsWith(matrix.configuration.OS, 'ubuntu') && matrix.configuration.CMAKE_C_COMPILER == 'clang' }}
      run: |
          sudo apt update -qqy
          if [[ "${{ matrix.configuration.CMAKE_C_COMPILER }}" == "clang" ]]; then
              script_name="${{ github.workspace }}/.devcontainer/scripts/llvm.sh"
              sudo chmod +x "${script_name}" && sudo "${script_name}" --silent=yes --alias=no --minimalistic --cleanup --versions="${{ matrix.configuration.version }}"
          fi
          echo "COMPILER_VERSION=$(clang -dumpversion | cut -d. -f1)" >> "$GITHUB_ENV"

    - name: Install gcc
      if: ${{ startsWith(matrix.configuration.OS, 'ubuntu') && matrix.configuration.CMAKE_C_COMPILER == 'gcc' }}
      run: |
          sudo apt update -qqy
          if [[ "${{ matrix.configuration.CMAKE_C_COMPILER }}" == "gcc" ]]; then
              script_name="${{ github.workspace }}/.devcontainer/scripts/gcc.sh"
              sudo chmod +x "${script_name}" && sudo "${script_name}" --silent=yes --alias=no --versions="${{ matrix.configuration.version }}"
          fi
          echo "COMPILER_VERSION=$(gcc -dumpversion | cut -d. -f1)" >> "$GITHUB_ENV"

    - name: Make toolchain path
      id: make_toolchain_path
      run: |
        TOOLCHAIN_PATH='${{ matrix.CMAKE_BUILD_TYPE }}/${{ matrix.configuration.CMAKE_C_COMPILER }}-$COMPILER_VERSION/${{ matrix.CSL_component }}'
        echo "TOOLCHAIN_PATH=${TOOLCHAIN_PATH}" >> $GITHUB_OUTPUT

    - name: CMake create destination directories (${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }})
      run: |
        cmake -E make_directory ${{ github.workspace }}/out/build/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }}
        cmake -E make_directory ${{ github.workspace }}/out/install/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }}
      
    - name: 📦 CMake configure (${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }})
      run: |
        cmake \
              -DCSL_BUILD_ALL:BOOL=OFF            \
              -DCSL_BENCHMARK_ALL:BOOL=OFF        \
              -DCSL_DOC_ALL:BOOL=OFF              \
              -DCSL_EXAMPLE_ALL:BOOL=OFF          \
              -DCSL_TEST_ALL:BOOL=OFF             \
            \
              -DCSL_BUILD_${{ matrix.CSL_component }}:BOOL=TRUE      \
              -DCSL_BENCHMARK_${{ matrix.CSL_component }}:BOOL=TRUE  \
              -DCSL_EXAMPLE_${{ matrix.CSL_component }}:BOOL=TRUE    \
              -DCSL_TEST_${{ matrix.CSL_component }}:BOOL=TRUE       \
            \
              -DCMAKE_C_COMPILER=/usr/bin/${{matrix.configuration.CMAKE_C_COMPILER}}-$COMPILER_VERSION                        \
              -DCMAKE_CXX_COMPILER=/usr/bin/${{matrix.configuration.CMAKE_CXX_COMPILER}}-$COMPILER_VERSION                    \
              -DCMAKE_CXX_FLAGS="$CMAKE_CXX_FLAGS ${{matrix.configuration.CMAKE_CXX_FLAGS}}"                                  \
              -DCMAKE_EXE_LINKER_FLAGS="$CMAKE_EXE_LINKER_FLAGS ${{matrix.configuration.CMAKE_EXE_LINKER_FLAGS}}"             \
              -DCMAKE_BUILD_TYPE:STRING=${{ matrix.CMAKE_BUILD_TYPE }}                                                        \
              -DCMAKE_INSTALL_PREFIX:PATH=${{ github.workspace }}/out/install/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }} \
              -DCMAKE_GENERATOR:STRING=Ninja                                                                                  \
              -G Ninja                                                                                                        \
              -S ${{ github.workspace }}                                                                                      \
              -B ${{ github.workspace }}/out/build/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }}

    # WIP: build the target, its tests, then use ctest filter to run only the targets tests (or all, as there are the only one which should be builded)
    #   rename tests: test_csl_${{ matrix.CSL_component }}_*

    - name: 🏗️ CMake build - (${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }})
      run: |
        cmake \
            --build ${{ github.workspace }}/out/build/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }} \
            --config ${{ matrix.CMAKE_BUILD_TYPE }} \
            --target all
      # --target ${{ matrix.CSL_component }}_build_all_tests

    - name: 🧪 CTest - (${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }})
      working-directory: ${{ github.workspace }}/out/build/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }}
      run: |
        ctest --parallel 10 \
        --output-on-failure \
        --test-dir ${{ github.workspace }}/out/build/${{ steps.make_toolchain_path.outputs.TOOLCHAIN_PATH }}
      # --no-tests=error
      # -R csl_test_${{ matrix.CSL_component }}
      # --tests-regex '^csl_test_${{ matrix.CSL_component }}*$'

      # TECH-DEBT: check examples (run as tests)
      # TECH-DEBT: check installation

