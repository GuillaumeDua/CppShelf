name: documentation-godbolt-links-checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'libs/*/examples/**'
      - 'libs/*/README.md'
      - 'doc/scripts/update_godbolt_links.py'
      - 'doc/.godbolt-manifest.json'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check examples / Godbolt links are up to date
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate README examples and Godbolt links
        run: python3 doc/scripts/update_godbolt_links.py

      - name: Check for changes
        id: diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open fix-up PR
        if: steps.diff.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ github.head_ref }}
          branch: documentation-godbolt-links/${{ github.event.pull_request.number }}
          delete-branch: true
          commit-message: 'docs: refresh README examples and Godbolt links'
          title: 'docs: refresh README examples and Godbolt links'
          body: >
            Auto-generated by the `documentation-godbolt-links-checks` workflow: the examples embedded
            in README.md, and/or their Godbolt links, were out of date with the files
            under `libs/*/examples/`. Merge this into your branch to fix it.

      - name: Warn (fork PR cannot be auto-fixed)
        if: steps.diff.outputs.changed == 'true' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::warning::README examples / Godbolt links are stale, but this PR comes from a fork so no fix-up PR can be pushed. Run 'python3 doc/scripts/update_godbolt_links.py' locally and commit the result."

      - name: Fail if stale
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "README examples / Godbolt links are out of date." >&2
          exit 1
