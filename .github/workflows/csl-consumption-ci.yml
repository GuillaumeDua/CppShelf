name: csl consumption CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: /usr/bin/bash --noprofile --norc -e -o pipefail {0}

jobs:
  consumption_test:

    name: Consumption (${{ matrix.configuration.CMAKE_C_COMPILER }}-${{ matrix.configuration.version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        configuration:
          - { CMAKE_C_COMPILER: clang, CMAKE_CXX_COMPILER: clang++, version: 'latest-stable' }
          - { CMAKE_C_COMPILER: gcc,   CMAKE_CXX_COMPILER: g++,     version: 'latest-stable' }

    env:
      build_dir: ${{ github.workspace }}/build/consumption/${{ matrix.configuration.CMAKE_C_COMPILER }}-${{ matrix.configuration.version }}

    steps:
    - uses: actions/checkout@v4

    - name: Install clang
      if: matrix.configuration.CMAKE_C_COMPILER == 'clang'
      run: |
        sudo apt update -qqy
        script_name="${{ github.workspace }}/.devcontainer/scripts/llvm.sh"
        sudo chmod +x "${script_name}" && sudo "${script_name}" --silent=yes --alias=no --minimalistic --cleanup --versions="${{ matrix.configuration.version }}"

    - name: Install gcc
      if: matrix.configuration.CMAKE_C_COMPILER == 'gcc'
      run: |
        sudo apt update -qqy
        script_name="${{ github.workspace }}/.devcontainer/scripts/gcc.sh"
        sudo chmod +x "${script_name}" && sudo "${script_name}" --silent=yes --alias=no --versions="${{ matrix.configuration.version }}"

    - name: 📦 Configure, build and test
      working-directory: ${{ github.workspace }}/test/consumption
      env:
        CMAKE_C_COMPILER:   ${{ matrix.configuration.CMAKE_C_COMPILER }}
        CMAKE_CXX_COMPILER: ${{ matrix.configuration.CMAKE_CXX_COMPILER }}
      run: |
        bash build.sh "${{ env.build_dir }}"  \
          -Dcsl_consumption_test_GIT_TAG=${{ github.head_ref || github.ref_name }}

  consumption_passed:
    name: Consumption passed
    needs: consumption_test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.consumption_test.result }}" != "success" ]]; then
            echo "Consumption jobs failed or were cancelled"
            exit 1
          fi
